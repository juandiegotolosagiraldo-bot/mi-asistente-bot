services:
  - type: worker
    name: mi-asistente-bot
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TZ
        value: Europe/Berlin
      - key: TELEGRAM_TOKEN
        fromSecret: TELEGRAM_TOKEN
      - key: GROQ_KEY
        fromSecret: GROQ_KEY
      - key: CHAT_ID
        fromSecret: CHAT_ID
